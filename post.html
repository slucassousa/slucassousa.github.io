<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Lucas Sousa</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .post-content {
            margin-bottom: 40px;
            font-size: 1.1rem;
            line-height: 1.8;
        }
        .post-content p {
            margin-bottom: 20px;
        }
        .post-meta {
            color: var(--gray);
            font-style: italic;
            margin-bottom: 30px;
            text-align: center;
        }
        .post-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
    </style>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="nav-link">Lucas Sousa</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="research.html" class="nav-link">Research</a></li>
                <li><a href="teaching.html" class="nav-link">Teaching and Etc.</a></li>
                <li><a href="small_talk.html" class="nav-link active">Small Talk</a></li>
                <li><a href="https://www.google.com" class="nav-link" target="_blank">CV</a></li>
            </ul>
        </div>
    </nav>

    <!-- Post Header -->
    <header class="cover-section" style="background-image: url('images/header/music.jpg');">
        <div class="cover-content">
            <h1 id="post-title">Loading...</h1>
        </div>
    </header>

    <!-- Post Content -->
    <section class="section">
        <div class="container" style="max-width: 800px;">
            <div class="post-meta" id="post-date-container" style="display: none;">
                Posted on <span class="post-date" id="post-date"></span>
            </div>
            
            <div id="loading-error" style="display: none; text-align: center; color: red;">
                <p>Error loading post. Are you running a local server?</p>
            </div>

            <div class="post-content" id="post-content">
                <!-- Markdown content will be injected here -->
            </div>

            <div class="text-center" style="margin-top: 40px;">
                <a href="small_talk.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container"></div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            
            if (!postId) {
                document.getElementById('post-title').textContent = 'Post Not Found';
                document.getElementById('post-content').innerHTML = '<p>No post ID provided.</p>';
                return;
            }

            try {
                // Fetch the post metadata from posts.json
                const jsonResponse = await fetch('posts.json');
                const posts = await jsonResponse.json();
                
                const postMeta = posts.find(p => p.url && p.url.includes(`id=${postId}`));
                if (postMeta) {
                    document.getElementById('post-title').textContent = postMeta.title;
                    document.getElementById('post-date').textContent = postMeta.date;
                    document.getElementById('post-date-container').style.display = 'block';
                    document.title = `${postMeta.title} - Lucas Sousa`;
                } else {
                    document.getElementById('post-title').textContent = 'Post';
                }

                // Fetch the markdown content
                const mdResponse = await fetch(`Small_Talk/posts/${postId}.md`);
                if (!mdResponse.ok) throw new Error('Markdown file not found');
                
                const markdownText = await mdResponse.text();
                
                // Convert Markdown to HTML
                document.getElementById('post-content').innerHTML = marked.parse(markdownText);
                
            } catch (error) {
                console.error(error);
                document.getElementById('loading-error').style.display = 'block';
                document.getElementById('post-title').textContent = 'Error';
            }
        });
    </script>
</body>
</html>
