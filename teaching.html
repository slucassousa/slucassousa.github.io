<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="nav-link">Lucas Sousa</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="research.html" class="nav-link">Research</a></li>
                <li><a href="teaching.html" class="nav-link">Teaching and Etc.</a></li>
                <li><a href="small_talk.html" class="nav-link">Small Talk</a></li>
                <li><a href="https://www.google.com" class="nav-link" target="_blank">CV</a></li>

            </ul>
        </div>
    </nav>

    <!-- Teaching Header -->
    <header class="cover-section header-teaching">
        <div class="cover-content">
            <h1>Teaching and Etc.</h1>
        </div>
    </header>

    <!-- Teaching and Etc. Section -->
    <section id="teaching" class="section">
        <div class="container">
            <h2 class="section-title">Teaching and Etc.</h2>
            <div class="listing" id="teaching-container">
                <!-- Teaching materials will be loaded dynamically -->
            </div>

            <script>
                document.addEventListener('DOMContentLoaded', async () => {
                    const container = document.getElementById('teaching-container');
                    try {
                        const response = await fetch('teaching.json');
                        const materials = await response.json();
                        container.innerHTML = materials.map(item => `
                            <div class="list-item">
                                <div class="date">${item.date}</div>
                                <div class="details">
                                    <h4>${item.url ? `<a href="${item.url}">${item.title}</a>` : item.title}</h4>
                                    <p>${item.description}</p>
                                </div>
                            </div>
                        `).join('');
                    } catch (error) {
                        console.error('Error loading teaching materials:', error);
                        container.innerHTML = '<p>Error loading teaching materials.</p>';
                    }
                });
            </script>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <!--  <p>&copy; 2026</p> -->
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
