<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course - Lucas Sousa</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .course-section { padding: 40px 0; }
        .course-content {
            margin-bottom: 40px;
            font-size: 1.1rem;
            line-height: 1.8;
        }
        /* Markdown generated elements styling */
        .course-content ul { padding-left: 20px; }
        .course-content li { margin-bottom: 10px; }
        .course-content h2, .course-content h3 { margin-top: 30px; }
        .course-content a { color: var(--primary-color); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .course-content a:hover { text-decoration: underline; }
        
        .announcement-card {
            background: #f8f9fa;
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 15px;
        }
        .announcement-date {
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 5px;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .gallery-grid img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="nav-link">Lucas Sousa</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="research.html" class="nav-link">Research</a></li>
                <li><a href="teaching.html" class="nav-link active">Teaching and Etc.</a></li>
                <li><a href="small_talk.html" class="nav-link">Small Talk</a></li>
                <li><a href="https://www.google.com" class="nav-link" target="_blank">CV</a></li>
            </ul>
        </div>
    </nav>

    <!-- Course Header -->
    <header class="cover-section header-teaching">
        <div class="cover-content">
            <h1 id="course-title">Loading...</h1>
        </div>
    </header>

    <!-- Course Content -->
    <section class="section">
        <div class="container">
            <div id="loading-error" style="display: none; text-align: center; color: red;">
                <p>Error loading course. Are you running a local server?</p>
            </div>

            <div class="course-content" id="course-content">
                <!-- Markdown content will be injected here -->
            </div>

            <div class="text-center" style="margin-top: 40px;">
                <a href="teaching.html" class="btn btn-outline btn-back"><i class="fas fa-arrow-left"></i> Back</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container"></div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('id');
            
            if (!courseId) {
                document.getElementById('course-title').textContent = 'Course Not Found';
                document.getElementById('course-content').innerHTML = '<p>No course ID provided.</p>';
                return;
            }

            try {
                // Fetch course metadata
                const jsonResponse = await fetch('teaching.json');
                const courses = await jsonResponse.json();
                
                const courseMeta = courses.find(c => c.url && c.url.includes(`id=${courseId}`));
                if (courseMeta) {
                    document.getElementById('course-title').textContent = courseMeta.title;
                    document.title = `${courseMeta.title} - Lucas Sousa`;
                } else {
                    document.getElementById('course-title').textContent = 'Course';
                }

                // Fetch the markdown content
                const mdResponse = await fetch(`courses/${courseId}.md`);
                if (!mdResponse.ok) throw new Error('Markdown file not found');
                
                const markdownText = await mdResponse.text();
                
                // Convert Markdown to HTML
                document.getElementById('course-content').innerHTML = marked.parse(markdownText);
                
            } catch (error) {
                console.error(error);
                document.getElementById('loading-error').style.display = 'block';
                document.getElementById('course-title').textContent = 'Error';
            }
        });
    </script>
</body>
</html>
