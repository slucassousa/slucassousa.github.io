<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Talk - Lucas Sousa</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="nav-link">Lucas Sousa</a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-menu">
            </ul>
        </div>
    </nav>

    <!-- Small Talk Header -->
    <header class="cover-section header-small-talk">
        <div class="cover-content">
            <h1>Small Talk</h1>
        </div>
    </header>

    <!-- Small Talk Section -->
    <section id="small-talk" class="section">
        <div class="container small-talk-container">
            <!-- Left Column: Posts -->
            <div class="posts-column">
                <h2 class="section-title">Posts</h2>
                <div class="listing" id="posts-container">
                    <!-- Posts will be loaded dynamically -->
                </div>
                <script>
                    document.addEventListener('DOMContentLoaded', async () => {
                        const container = document.getElementById('posts-container');
                        try {
                            const response = await fetch('posts.json');
                            const posts = await response.json();
                            const cardsContent = posts.map(post => `
                                <div class="list-item">
                                    <div class="date">${post.date}</div>
                                    <div class="details">
                                        <h4>${post.url ? `<a href="${post.url}">${post.title}</a>` : post.title}</h4>
                                        <p>${post.description}</p>
                                    </div>
                                </div>
                            `)
                            container.innerHTML = cardsContent.join('');
                        } catch (error) {
                            console.error('Error loading posts:', error);
                            container.innerHTML = '<p>Error loading posts.</p>';
                        }
                    });
                </script>
            </div>

            <!-- Right Column: Shuffle Content -->
            <div class="shuffle-column">
                <h2 class="section-title">Other stuff</h2>
                <div class="shuffle-buttons">

                    <a href="Small_Talk/math_websites.html" class="shuffle-btn">
                        Math Websites
                    </a>
                    <a href="Small_Talk/pictures.html" class="shuffle-btn">
                        Pictures
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <!--  <p>&copy; 2026</p> -->
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
